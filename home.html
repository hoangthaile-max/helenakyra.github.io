<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helena & Kyra's Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfbf7;
            color: #4a5d4e;
        }
        .font-serif {
            font-family: 'Crimson Pro', serif;
        }
        .modal-open {
            overflow: hidden;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out forwards;
        }
        .ghibli-border {
            border: 12px solid white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="min-h-screen selection:bg-[#e2eddf]">

    <!-- Header -->
    <header class="pt-16 pb-12 px-6 text-center">
        <div class="inline-block p-2 bg-[#e2eddf] rounded-full mb-4 animate-bounce" style="animation-duration: 3s;">
            <i data-lucide="sparkles" class="w-6 h-6 text-[#7da87b]"></i>
        </div>
        <h1 class="text-4xl md:text-5xl font-serif font-medium tracking-tight text-[#2d3a30]">Helena & Kyra's Gallery</h1>
        <p class="mt-3 text-lg text-[#6b7c6e] italic font-light">Where every brushstroke tells a story</p>
    </header>

    <!-- Main Grid -->
    <main id="art-grid" class="max-w-6xl mx-auto px-6 pb-24 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
        <!-- JS will populate this -->
    </main>

    <!-- Lightbox Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 hidden">
        <div id="modal-overlay" class="absolute inset-0 bg-[#2d3a30]/60 backdrop-blur-md"></div>
        
        <div class="relative bg-[#fdfbf7] w-full max-w-4xl max-h-[90vh] rounded-[2rem] overflow-hidden shadow-2xl flex flex-col md:flex-row border border-white/20 z-10">
            <!-- Close Button -->
            <button id="close-modal" class="absolute top-5 right-5 z-20 p-2 bg-white/90 backdrop-blur hover:bg-white rounded-full transition-all text-[#2d3a30] shadow-sm active:scale-95">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>

            <!-- Image Section -->
            <div class="md:w-5/12 h-48 md:h-auto relative bg-[#e2eddf]">
                <img id="modal-img" src="" alt="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent md:hidden"></div>
            </div>

            <!-- Content Section -->
            <div id="modal-content" class="md:w-7/12 p-8 md:p-12 overflow-y-auto flex flex-col bg-[#fdfbf7]">
                <!-- Views will be injected here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-16 border-t border-[#e2eddf] text-center">
        <div class="max-w-xs mx-auto space-y-4">
            <p class="text-[#8a9b8d] text-sm tracking-wide uppercase">Helena & Kyra's Gallery</p>
            <div class="flex justify-center gap-6">
                <a href="https://www.instagram.com/helenakyra_art/" target="_blank" class="text-[#7da87b] hover:text-[#2d3a30] transition-colors">
                    <i data-lucide="instagram" class="w-6 h-6"></i>
                </a>
                <div class="text-[#7da87b]">
                    <i data-lucide="heart" class="w-6 h-6 fill-current"></i>
                </div>
            </div>
            <p class="text-xs text-[#b5c5b8]">Built with love for the two little artists.</p>
        </div>
    </footer>

    <script>
        // --- Configuration ---
        const apiKey = "https://raw.githubusercontent.com/hoangthaile-max/helenakyra.github.io/refs/heads/main/abc.txt"; 
        //const apiKey = "REPLACE_ME_WITH_KEY";
        //const TEXT_MODEL = "gemini-3.1-flash-lite-preview"; 
        //const TEXT_MODEL = "gemini-1.5-flash"; 
        const TEXT_MODEL = "gemini-2.5-flash"; 
        const TTS_MODEL = "gemini-2.5-flash-preview-tts";  
        const INSTAGRAM_URL = "https://www.instagram.com/helenakyra_art/";

        const ART_COLLECTION = [
            { id: 1, title: "A Ladybug", url: "https://instagram.fsin16-1.fna.fbcdn.net/v/t51.82787-15/616166725_17929772901187483_2842979988752877310_n.jpg?stp=dst-jpg_e35_tt6&_nc_cat=111&ig_cache_key=MzM2NTk4NDE1NzY0MDkzNDY5NA%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjE0NDB4MTQxOS5zZHIuQzMifQ%3D%3D&_nc_ohc=KCMvz2Ur-yUQ7kNvwEPjkho&_nc_oc=Adq2Xe1JdpFdtzf7RDdRqaUlMpTC8S3G_4EU5Bdg6YGgvcGc6GXfp7X0Ca8hYhtwGdCwTmnB2eSj4UkKlrENBI_3&_nc_ad=z-m&_nc_cid=1105&_nc_zt=23&_nc_ht=instagram.fsin16-1.fna&_nc_gid=sfhMsYFBJtY4f_YnzMWQPQ&_nc_ss=7a32e&oh=00_Afz9AKljqLNk_UVpmzKeNoWtFmQmJcr-d7l89s-nBS7oEg&oe=69CD68EF", description: "A ladybug and the morning dew." },
            { id: 2, title: "A Summer Delight", url: "https://instagram.fsin16-1.fna.fbcdn.net/v/t51.82787-15/553761758_17908475895229221_8871575576596994693_n.jpg?stp=dst-jpg_e35_tt6&_nc_cat=107&ig_cache_key=MzcyOTkwMDg2Mjc4MjM5OTA4NQ%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjE0NDB4MTYzNS5zZHIuQzMifQ%3D%3D&_nc_ohc=8LUlX3Go7W8Q7kNvwEIju8I&_nc_oc=Adqr_QCd_laJcrINy6OHwBmrwjHl0vPp4kvCWT5ATI6aFZbVKlv5KZ6EHL95hZyUne_YqP-UIrOcpGXn2t537hKG&_nc_ad=z-m&_nc_cid=1105&_nc_zt=23&_nc_ht=instagram.fsin16-1.fna&_nc_gid=sfhMsYFBJtY4f_YnzMWQPQ&_nc_ss=7a32e&oh=00_Afw1I1QWlGFOR7L8iBMsUqSEVqIOXAFjEUZIvuP80hdxeA&oe=69CD5D3E", description: "Citrus sunlight in a glass." },
            { id: 3, title: "Hot Chocolate", url: "https://instagram.fsin16-1.fna.fbcdn.net/v/t51.75761-15/482957858_17884983960229221_1814033620582830280_n.jpg?stp=dst-jpegr_e35_tt6&_nc_cat=100&ig_cache_key=MzU4Mjg2ODE1ODk2Njk4NTMzMg%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjE0NDB4MTgwMC5oZHIuQzMifQ%3D%3D&_nc_ohc=3KZSeuKQ33QQ7kNvwGAOOmV&_nc_oc=AdpGV46CqoVCS4O8f_egG8vNMStTSMlv5opajAiv0vnbxhXJmvGQA-fOy-l9tuxvruuqZaSVpuaZcHPSsLF1ieRz&_nc_ad=z-m&_nc_cid=1105&_nc_zt=23&_nc_ht=instagram.fsin16-1.fna&_nc_gid=sfhMsYFBJtY4f_YnzMWQPQ&_nc_ss=7a32e&oh=00_AfxWS_owyn9yYT_jkt_6jF7Y1qOISVtkvYYy9_a6dN3gjQ&oe=69CD4ADB", description: "Sipping hot chocolate always creates vivid memories." },
            { id: 4, title: "Cobra or Snail", url: "https://instagram.fsin16-1.fna.fbcdn.net/v/t51.82787-15/626529279_18110189563657057_3918848281205791207_n.jpg?stp=dst-jpg_e35_p320x320_tt6&_nc_cat=105&ig_cache_key=MzM3Mjc1MjY4Njc0Njg3NDI4NQ%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjE0NDB4MTY3My5zZHIuQzMifQ%3D%3D&_nc_ohc=gFj8ThHoYg0Q7kNvwEnRFnq&_nc_oc=AdqgJth1OMC71mvXzvUGHbRAqQ8Hfsy187PDr9WDsIs3fhdNvpw9bLQ5gQLJImIyaEDyDj0ln2xuUUU-LlwpoKZ-&_nc_ad=z-m&_nc_cid=1105&_nc_zt=23&_nc_ht=instagram.fsin16-1.fna&_nc_gid=zTUyV7xi7oWA-4jeadzhjw&_nc_ss=7a32e&oh=00_Afypxxx2YW5vsrcrF7-V40c5Vt9PGVUFEz0z1GFEyZ3F_g&oe=69CD45C0", description: "A piece of abstract art. Is this a cobra or a snail?." },
            { id: 5, title: "A Dinosaur Pot", url: "https://instagram.fsin16-1.fna.fbcdn.net/v/t51.82787-15/622567959_18081823226463698_5183305658520184688_n.jpg?stp=dst-jpg_e35_p320x320_tt6&_nc_cat=109&ig_cache_key=MzM2NTI5MTg4MTE0NzEzMjE0MQ%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjE0NDB4MTgwMC5zZHIuQzMifQ%3D%3D&_nc_ohc=O7i6osoMK9YQ7kNvwGExV0o&_nc_oc=AdrcSRavpGEclOHrXbUtktNmaP5kb-YCpPv6L7PnM6G9GGdM6_scXDtokVMmBE9-zyq1vBgeXGA5k7V5RVTCOfHS&_nc_ad=z-m&_nc_cid=1105&_nc_zt=23&_nc_ht=instagram.fsin16-1.fna&_nc_gid=5odbZQWVC4O54xbw5dN8pA&_nc_ss=7a32e&oh=00_Afyh5lhKPUcxs-UxGm_bAmLffnRdnceuhUYflYsDozbOPQ&oe=69CD4C65", description: "Have you ever seen a dinosaur in your garden?" },
            { id: 6, title: "A Mermaid’s Birthday Party", url: "https://instagram.fsin16-1.fna.fbcdn.net/v/t51.82787-15/621587623_17997566552883954_8711878567433029713_n.jpg?stp=dst-jpg_e35_p320x320_tt6&_nc_cat=107&ig_cache_key=MzQyMDU3ODM0NzU5NTAwNjQ2NA%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjE0NDB4MTc3MS5zZHIuQzMifQ%3D%3D&_nc_ohc=-QvM4fjr-_gQ7kNvwGlNMAp&_nc_oc=Adpde-ZnwNpWMEKySX-u04pJN18PNPnwyzDNKG_t5XJ5eE6pGllsDiqbqA-fRobsah_9MXUclfymYbRWqp4RMzWJ&_nc_ad=z-m&_nc_cid=1105&_nc_zt=23&_nc_ht=instagram.fsin16-1.fna&_nc_gid=zQkEFXr1AI1SP2I7n_5VEw&_nc_ss=7a32e&oh=00_AfxXmfevAySHJHYRsDLqXsM7_dMGkU7Fa9IEVW4Y1g5rpg&oe=69CD5D26", description: "Kyra dreamed to travel the ocean in the form of a mermaid. Today was her birthday and her friends threw her a sweet party." },
        ];

        // --- State ---
        let selectedArt = null;
        let activeView = null; 
        let currentStoryText = "";
        let audioUrl = null;
        let audioObj = null;
        let isSpeaking = false;

        // --- UI Elements ---
        const gridEl = document.getElementById('art-grid');
        const modalEl = document.getElementById('modal');
        const modalContentEl = document.getElementById('modal-content');
        const modalImgEl = document.getElementById('modal-img');
        const overlayEl = document.getElementById('modal-overlay');
        const closeBtn = document.getElementById('close-modal');

        // --- Initialization ---
        function init() {
            renderGrid();
            lucide.createIcons();
            
            overlayEl.addEventListener('click', closeModal);
            closeBtn.addEventListener('click', closeModal);
        }

        function renderGrid() {
            gridEl.innerHTML = ART_COLLECTION.map(art => `
                <div onclick="openMenu(${art.id})" class="group cursor-pointer transition-all duration-500">
                    <div class="relative aspect-[4/5] overflow-hidden rounded-3xl ghibli-border group-hover:shadow-2xl group-hover:-rotate-1 transition-all duration-500 bg-white">
                        <img src="${art.url}" alt="${art.title}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-[#7da87b]/10 transition-colors duration-500"></div>
                    </div>
                    <div class="mt-6 text-center">
                        <h3 class="text-xl font-serif font-medium text-[#2d3a30]">${art.title}</h3>
                        <div class="w-8 h-px bg-[#e2eddf] mx-auto my-2"></div>
                        <p class="text-xs text-[#8a9b8d] uppercase tracking-[0.2em]">Artist Collection</p>
                    </div>
                </div>
            `).join('');
        }

        // --- Navigation ---
        function openMenu(id) {
            selectedArt = ART_COLLECTION.find(a => a.id === id);
            modalImgEl.src = selectedArt.url;
            showView('menu');
            modalEl.classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            stopAudio();
            modalEl.classList.add('hidden');
            document.body.classList.remove('modal-open');
            selectedArt = null;
            activeView = null;
            currentStoryText = "";
            audioUrl = null;
        }

        function showView(view) {
            activeView = view;
            let html = '';

            if (view === 'menu') {
                html = `
                    <div class="flex flex-col h-full animate-fadeIn">
                        <span class="text-[#7da87b] text-xs font-bold uppercase tracking-[0.25em] mb-2">Magic Options</span>
                        <h2 class="text-3xl font-serif text-[#2d3a30] mb-8">${selectedArt.title}</h2>
                        <div class="space-y-4">
                            ${renderButton('BookOpen', 'Bedtime Story in English', "startStory('en')")}
                            ${renderButton('Globe2', 'Bedtime Story in Chinese', "startStory('zh')")}
                            ${renderButton('Heart', 'About the Artists', "showView('about')")}
                        </div>
                    </div>
                `;
            } else if (view === 'story-en' || view === 'story-zh') {
                html = `
                    <div class="flex flex-col h-full animate-fadeIn">
                        <div class="flex justify-between items-start mb-4">
                            <button onclick="stopAudio(); showView('menu')" class="text-[#7da87b] text-xs font-bold uppercase tracking-[0.25em] flex items-center gap-1 hover:underline">
                                ← Back to Options
                            </button>
                            <div id="audio-controls" class="hidden">
                                <button id="speak-btn" onclick="toggleAudio()" class="flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold bg-[#e2eddf] text-[#7da87b] hover:bg-[#7da87b] hover:text-white transition-all">
                                    <i data-lucide="volume-2" class="w-3 h-3"></i>
                                    <span>READ STORY</span>
                                </button>
                            </div>
                        </div>
                        <h2 class="text-3xl font-serif text-[#2d3a30] mb-6">${selectedArt.title}</h2>
                        <div id="story-display" class="flex-grow flex flex-col justify-center items-center min-h-[12rem] text-center">
                            <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-[#7da87b] mb-4"></i>
                            <p class="italic text-[#8a9b8d]">Whispering to the forest spirits...</p>
                        </div>
                        <div id="story-footer" class="hidden mt-8 pt-6 border-t border-[#e2eddf]">
                            <a href="${INSTAGRAM_URL}" target="_blank" class="flex items-center justify-center gap-3 w-full px-6 py-4 bg-[#7da87b] hover:bg-[#6b9369] text-white rounded-2xl transition-all shadow-sm group">
                                <i data-lucide="instagram" class="w-5 h-5"></i>
                                <span class="font-medium">Please visit our Instagram Profile</span>
                                <i data-lucide="chevron-right" class="w-4 h-4 ml-1 transition-transform group-hover:translate-x-1"></i>
                            </a>
                        </div>
                    </div>
                `;
            } else if (view === 'about') {
                html = `
                    <div class="flex flex-col h-full animate-fadeIn">
                        <button onclick="showView('menu')" class="text-[#7da87b] text-xs font-bold uppercase tracking-[0.25em] mb-2 flex items-center gap-1 hover:underline">← Back to Options</button>
                        <h2 class="text-3xl font-serif text-[#2d3a30] mb-4">About Helena & Kyra</h2>
                        <div class="flex-grow">
                            <p class="text-[#6b7c6e] leading-relaxed mb-6">Welcome to our little world of imagination. Every piece you see here is a window into our's childlike dreams, captured with paint, canvas, and plenty of heart.</p>
                            <div class="bg-[#f0f7ef] p-6 rounded-2xl border border-[#e2eddf]">
                                <p class="text-[#4a5d4e] italic text-center">"Every child is an artist. The problem is how to remain an artist once we grow up."</p>
                            </div>
                        </div>
                        <div class="mt-8">
                            <a href="${INSTAGRAM_URL}" target="_blank" class="flex items-center justify-center gap-3 w-full px-6 py-4 bg-[#7da87b] hover:bg-[#6b9369] text-white rounded-2xl transition-all shadow-sm group">
                                <i data-lucide="instagram" class="w-5 h-5"></i>
                                <span class="font-medium">Please visit our Instagram Profile</span>
                                <i data-lucide="chevron-right" class="w-4 h-4 ml-1 transition-transform group-hover:translate-x-1"></i>
                            </a>
                        </div>
                    </div>
                `;
            }

            modalContentEl.innerHTML = html;
            lucide.createIcons();
        }

        function renderButton(icon, label, action) {
            return `
                <button onclick="${action}" class="w-full group flex items-center justify-between p-5 bg-white border border-[#e2eddf] rounded-2xl hover:border-[#7da87b] hover:shadow-md transition-all active:scale-[0.98]">
                    <div class="flex items-center gap-4">
                        <div class="p-2 bg-[#f0f7ef] rounded-lg group-hover:bg-[#7da87b] group-hover:text-white transition-colors">
                            <i data-lucide="${icon.toLowerCase()}" class="w-5 h-5"></i>
                        </div>
                        <span class="font-medium text-[#4a5d4e]">${label}</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-[#8a9b8d]"></i>
                </button>
            `;
        }

        // --- Logic: Story Generation ---
        async function startStory(lang) {
            showView(lang === 'zh' ? 'story-zh' : 'story-en');
            
            const langLabel = lang === 'zh' ? "Chinese (Mandarin)" : "English";
            const systemPrompt = `You are a gentle storyteller in the style of Studio Ghibli. Write a 30-second bedtime story (approx 100-150 words) in ${langLabel} based on a child's drawing. The story should be magical, peaceful, and end with a soft lesson about kindness or imagination.`;
            const userQuery = `Write a bedtime story about this piece of art: ${selectedArt.title}. The art depicts: ${selectedArt.description}`;

            try {
                const text = await fetchWithRetry(() => callGeminiText(systemPrompt, userQuery));
                currentStoryText = text;
                renderStoryText(text);
            } catch (err) {
                console.error("Story Gen Error:", err);
                renderError("The magic is resting right now.");
            }
        }

        async function callGeminiText(systemPrompt, userQuery) {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userQuery }] }],
                    system_instruction: { parts: [{ text: systemPrompt }] }
                })
            });
            if (!response.ok) throw new Error('API Error');
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text;
        }

        function renderStoryText(text) {
            const display = document.getElementById('story-display');
            display.innerHTML = `
                <div class="prose prose-stone max-w-none animate-fadeIn">
                    <p class="text-lg leading-relaxed text-[#4a5d4e] font-light italic bg-[#e2eddf]/20 p-6 rounded-2xl border border-white">
                        "${text}"
                    </p>
                </div>
            `;
            document.getElementById('audio-controls').classList.remove('hidden');
            document.getElementById('story-footer').classList.remove('hidden');
            lucide.createIcons();
        }

        function renderError(msg) {
            document.getElementById('story-display').innerHTML = `
                <div class="p-6 bg-red-50 text-red-600 rounded-2xl text-center border border-red-100">${msg}</div>
            `;
        }

        // --- Logic: Audio ---
        async function toggleAudio() {
            if (isSpeaking) {
                stopAudio();
                return;
            }

            if (audioUrl) {
                playExistingAudio();
                return;
            }

            const btn = document.getElementById('speak-btn');
            btn.innerHTML = `<i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i><span>PREPARING...</span>`;
            lucide.createIcons();

            const isChinese = activeView === 'story-zh';
            const voiceName = isChinese ? "Aoede" : "Kore";
            const instruction = isChinese ? "请用温柔亲切的声音朗读这段童话：" : "Read this story in a gentle, warm, and whimsical narrating voice:";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${apiKey}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${instruction} ${currentStoryText}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } }
                        }
                    })
                });

                if (!response.ok) throw new Error('TTS Error');
                const result = await response.json();
                const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                
                if (pcmData) {
                    audioUrl = pcmToWav(pcmData);
                    playExistingAudio();
                }
            } catch (err) {
                btn.innerHTML = `<span>Voice Error</span>`;
                setTimeout(() => resetAudioBtn(), 2000);
            }
        }

        function playExistingAudio() {
            audioObj = new Audio(audioUrl);
            audioObj.play();
            isSpeaking = true;
            updateAudioBtnState();
            audioObj.onended = () => {
                isSpeaking = false;
                resetAudioBtn();
            };
        }

        function stopAudio() {
            if (audioObj) {
                audioObj.pause();
                audioObj.currentTime = 0;
            }
            isSpeaking = false;
            resetAudioBtn();
        }

        function updateAudioBtnState() {
            const btn = document.getElementById('speak-btn');
            if (!btn) return;
            btn.classList.add('bg-amber-100', 'text-amber-700');
            btn.classList.remove('bg-[#e2eddf]', 'text-[#7da87b]');
            btn.innerHTML = `<i data-lucide="square" class="w-3 h-3 fill-current"></i><span>STOP AUDIO</span>`;
            lucide.createIcons();
        }

        function resetAudioBtn() {
            const btn = document.getElementById('speak-btn');
            if (!btn) return;
            btn.classList.remove('bg-amber-100', 'text-amber-700');
            btn.classList.add('bg-[#e2eddf]', 'text-[#7da87b]');
            btn.innerHTML = `<i data-lucide="volume-2" class="w-3 h-3"></i><span>READ STORY</span>`;
            lucide.createIcons();
        }

        // --- Helpers ---
        async function fetchWithRetry(fn, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    return await fn();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        function pcmToWav(pcmBase64, sampleRate = 24000) {
            const byteChars = atob(pcmBase64);
            const byteNums = new Array(byteChars.length);
            for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
            const pcmData = new Uint8Array(byteNums);
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            view.setUint32(0, 0x52494646, false); // RIFF
            view.setUint32(4, 36 + pcmData.length, true);
            view.setUint32(8, 0x57415645, false); // WAVE
            view.setUint32(12, 0x666d7420, false); // fmt 
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // data
            view.setUint32(40, pcmData.length, true);
            return URL.createObjectURL(new Blob([header, pcmData], { type: 'audio/wav' }));
        }

        window.onload = init;
    </script>
