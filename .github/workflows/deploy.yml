name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"] # Or your default branch name

permissions:
  contents: read      # Required to "checkout" your code
  pages: write        # Required to talk to the GitHub Pages API
  id-token: write     # Required to verify the deployment is authentic

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # This line finds your placeholder and replaces it with the secret
          sed -i "s/REPLACE_WITH_GEMINI_KEY/${{ secrets.GEMINI_API_KEY }}/g" home.html

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        uses: actions/deploy-pages@v4
